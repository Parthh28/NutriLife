steps:
  # Step 1: Build the Docker image from the backend directory
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrilife-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrilife-backend:latest'
      - './backend'   # <-- build context is the backend folder

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/nutrilife-backend'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutrilife-backend'
      - '--image=gcr.io/$PROJECT_ID/nutrilife-backend:$COMMIT_SHA'
      - '--region=asia-south1'      # Mumbai — closest to India
      - '--platform=managed'
      - '--allow-unauthenticated'   # Public API
      - '--port=8080'
      - '--memory=512Mi'
      - '--min-instances=0'         # Scale to zero when idle (saves cost)
      - '--max-instances=3'

images:
  - 'gcr.io/$PROJECT_ID/nutrilife-backend'

options:
  logging: CLOUD_LOGGING_ONLY
