steps:
  # Step 1: Build the Docker image from the backend directory
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '--progress=plain'
      - '-f'
      - './backend/Dockerfile'       # Explicit path to Dockerfile (Cloud Build runs from /workspace root)
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrilife-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrilife-backend:latest'
      - './backend'                  # Build context = backend folder

  # Step 2: Push image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/nutrilife-backend'

  # Step 3: Deploy to Cloud Run (Mumbai region - lowest latency from India)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutrilife-backend'
      - '--image=gcr.io/$PROJECT_ID/nutrilife-backend:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=3'

images:
  - 'gcr.io/$PROJECT_ID/nutrilife-backend'

options:
  logging: CLOUD_LOGGING_ONLY
